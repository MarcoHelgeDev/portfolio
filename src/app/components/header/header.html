<header class="header">
  <div class="header__inner">
    <div class="header__left">
      <div class="language-toggle">
        <button
          type="button"
          [class.is-active]="languageService.isEnglish()"
          (click)="switchLanguage('en')"
        >
          EN
        </button>

        <button
          type="button"
          [class.is-active]="languageService.isGerman()"
          (click)="switchLanguage('de')"
        >
          DE
        </button>
      </div>

      <nav class="desktop-nav" aria-label="Main navigation">
        <a routerLink="/" fragment="about-me">{{ headerTexts.aboutMe }}</a>
        <a routerLink="/" fragment="skills">{{ headerTexts.skills }}</a>
        <a routerLink="/" fragment="projects">{{ headerTexts.projects }}</a>
      </nav>
    </div>

    <a class="logo" routerLink="/" aria-label="Back to start" (click)="closeMenu()">
      <img class="logo__image logo__image--filled" src="icons/logo.svg" alt="" />
      <img class="logo__image logo__image--outline" src="icons/logo-outline.svg" alt="" />
      <img class="logo__mark" src="icons/logo-mark.svg" alt="" />
    </a>

    <button
      class="burger-button"
      type="button"
      [attr.aria-label]="headerTexts.menuAriaLabel"
      [class.is-open]="isMenuOpen"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="mobile-menu" [class.is-open]="isMenuOpen">
      <div class="mobile-menu__inner">
        <nav class="mobile-nav" aria-label="Mobile navigation">
          <a routerLink="/" fragment="about-me" (click)="closeMenu()">{{ headerTexts.aboutMe }}</a>
          <a routerLink="/" fragment="skills" (click)="closeMenu()">{{ headerTexts.skills }}</a>
          <a routerLink="/" fragment="projects" (click)="closeMenu()">{{ headerTexts.projects }}</a>
        </nav>

        <div class="language-toggle">
          <button
            type="button"
            [class.is-active]="languageService.isEnglish()"
            (click)="switchMobileLanguage('en')"
          >
            EN
          </button>

          <button
            type="button"
            [class.is-active]="languageService.isGerman()"
            (click)="switchMobileLanguage('de')"
          >
            DE
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
