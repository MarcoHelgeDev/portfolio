<footer class="footer">
  <div class="footer__inner">
    <a class="footer__brand" routerLink="/" fragment="hero" aria-label="Back to start">
      <img class="footer__logo-image footer__logo-image--filled" src="icons/logo.svg" alt="" />
      <img
        class="footer__logo-image footer__logo-image--outline"
        src="icons/logo-outline.svg"
        alt=""
      />
    </a>

    <div class="footer__info">
      <span>{{ footerTexts.role }}</span>
      <span>{{ footerTexts.location }}</span>
    </div>

    <p class="footer__copyright">{{ footerTexts.copyright }}</p>

    <nav class="footer__links" aria-label="Footer navigation">
      <a href="https://github.com/MarcoHelgeDev" target="_blank" rel="noopener noreferrer"
        >Github</a
      >
      <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="mailto:webdev-acc@proton.me">Email</a>
      <a routerLink="/legal-notice">{{ footerTexts.legalNotice }}</a>
      <a routerLink="/privacy-policy">{{ footerTexts.privacyPolicy }}</a>
    </nav>
  </div>
</footer>
