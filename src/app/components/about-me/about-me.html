<section class="about-me" id="about-me">
  <div class="about-me__inner">
    <div class="about-me__photo-wrapper" [attr.aria-label]="aboutTexts.photoAriaLabel">
      <div class="about-me__photo"></div>
    </div>

    <div class="about-me__content">
      <p class="about-me__label">{{ aboutTexts.label }}</p>

      <article class="about-me__card">
        <h2>{{ aboutTexts.title }}</h2>

        <div class="about-me__text-content">
          <p class="about-me__intro">
            {{ aboutTexts.intro }}
          </p>

          <div class="about-me__highlights">
            <div class="about-me__highlight">
              <span class="about-me__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"
                  />
                </svg>
              </span>

              <p>
                {{ aboutTexts.location }}
              </p>
            </div>

            <div class="about-me__highlight">
              <span class="about-me__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M9 2a4 4 0 0 0-4 4v.35A4.5 4.5 0 0 0 3 10a4.5 4.5 0 0 0 2 3.74V18a4 4 0 0 0 4 4h1V2H9Zm6 0h-1v20h1a4 4 0 0 0 4-4v-.35A4.5 4.5 0 0 0 21 14a4.5 4.5 0 0 0-2-3.74V6a4 4 0 0 0-4-4Zm-7 8H6a2 2 0 0 1 2-2v2Zm0 8a2 2 0 0 1-2-2h2v2Zm8-10a2 2 0 0 1 2 2h-2V8Zm0 10v-2h2a2 2 0 0 1-2 2Z"
                  />
                </svg>
              </span>

              <p>
                {{ aboutTexts.mindset }}
              </p>
            </div>

            <div class="about-me__highlight">
              <span class="about-me__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path
                    d="m12 2 2.1 3.7 4.2-.8.8 4.2L22 12l-2.9 2.9-.8 4.2-4.2-.8L12 22l-2.1-3.7-4.2.8-.8-4.2L2 12l2.9-2.9.8-4.2 4.2.8L12 2Zm-1.1 13.2 5.7-5.7-1.4-1.4-4.3 4.3-2.1-2.1-1.4 1.4 3.5 3.5Z"
                  />
                </svg>
              </span>

              <p>
                {{ aboutTexts.problemSolving }}
              </p>
            </div>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
