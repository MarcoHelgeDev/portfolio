<section class="references" id="references">
  <div class="references__inner">
    <h2>{{ testimonialTexts.title }}</h2>

    <div class="references__slider">
      <div class="references__viewport">
        <div class="references__quote" aria-hidden="true">“</div>

        <div
          class="references__cards"
          [class.references__cards--animating]="isAnimating"
          [class.references__cards--next]="slideDirection === 'next'"
          [class.references__cards--previous]="slideDirection === 'previous'"
          (transitionend)="finishSlide($event)"
        >
          @for (reference of visibleReferences; track reference.author; let index = $index) {
            <article class="reference-card" [class.reference-card--active]="isCardActive(index)">
              <p class="reference-card__text">{{ reference.text }}</p>

              <div class="reference-card__author">
                <span></span>
                <p>{{ reference.author }}</p>
              </div>
            </article>
          }
        </div>

        <div class="references__fade"></div>
      </div>

      <div class="references__controls">
        <button
          class="references__arrow references__arrow--previous"
          type="button"
          [attr.aria-label]="testimonialTexts.previousAriaLabel"
          [disabled]="isAnimating"
          (click)="showPreviousReference()"
        >
          ←
        </button>

        <div class="references__dots">
          @for (reference of references; track reference.author; let index = $index) {
            <button
              type="button"
              [attr.aria-label]="testimonialTexts.dotAriaLabel"
              [class.is-active]="index === activeIndex"
              [disabled]="isAnimating"
              (click)="setActiveReference(index)"
            ></button>
          }
        </div>

        <button
          class="references__arrow references__arrow--next"
          type="button"
          [attr.aria-label]="testimonialTexts.nextAriaLabel"
          [disabled]="isAnimating"
          (click)="showNextReference()"
        >
          →
        </button>
      </div>
    </div>
  </div>
</section>
